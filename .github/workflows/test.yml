name: Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: retrovault_db_test
          POSTGRES_USER: retrovault
          POSTGRES_PASSWORD: retrovault
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "NODE_ENV=test" > apps/api/.env
          echo "DATABASE_URL_TEST=${{ secrets.DATABASE_URL_TEST }}" >> apps/api/.env
          echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" >> apps/api/.env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> apps/api/.env

      - name: Create Prisma Client
        run: pnpm prisma generate
        working-directory: apps/api

      - name: Db Push
        run: pnpm prisma db push
        working-directory: apps/api

      - name: Run tests
        run: pnpm test:e2e
        working-directory: apps/api